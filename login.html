<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="assets/css/style.css">
    <title>Halaman Masuk</title>
</head>
<body>
    <div id="card"></div>

    <form action="index.html" target="blank">
    <fieldset class="kotak_login">
        <p class="tulisan_login"><b>SILAHKAN MASUK</b></p>
        &nbsp;
        <p>Nama Lengkap</p>
        <input type="text" name="username" class="form_login" placeholder="Nama Lengkap">

        <p>Masukkan Password</p>
        <input type="text" name="password" class="form_login" placeholder="Masukkan Password">

        <input type="submit" class="tombol_login" value="LOGIN">
        <p align="center" class="text">Belum punya akun? <a href="signup.html">Daftar</a></p>
    </fieldset>
    </form>

</body>
</html>
